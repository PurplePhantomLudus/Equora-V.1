<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Equora - Harmonies Score Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <!-- Optimización para PWA a pantalla completa -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <div id="app-container">
        <!-- PANTALLA 1: Configuración de Jugadores -->
        <section id="pantalla-inicio" class="active">
            <h1>EQUORA</h1>
            <p>Calculadora para Harmonies</p>
            <div class="input-group">
                <label>Número de Jugadores</label>
                <input type="number" id="num-jugadores" min="1" max="4" value="2">
            </div>
            <button onclick="comenzarPartida()">EMPEZAR</button>
        </section>

        <!-- PANTALLA 2: Recuento Operativo (Se repite por jugador) -->
        <section id="pantalla-puntuacion" class="hidden">
            <h2 id="nombre-jugador-activo">Jugador 1</h2>
            
            <!-- Recuento de Fauna -->
            <div class="seccion-puntos">
                <h3>🐾 Animales y Espíritus</h3>
                <input type="number" id="puntos-animales" placeholder="Puntos cartas animal">
                <input type="number" id="puntos-espiritus" placeholder="Puntos espíritus">
                <input type="number" id="cubos-animal" placeholder="Total cubos colocados (para desempate)">
            </div>

            <!-- Recuento de Hábitats -->
            <div class="seccion-puntos">
                <h3>🌲 Paisaje</h3>
                <div class="grid-inputs">
                    <input type="number" id="arboles-1" placeholder="Árboles Niv. 1">
                    <input type="number" id="arboles-2" placeholder="Árboles Niv. 2">
                    <input type="number" id="arboles-3" placeholder="Árboles Niv. 3">
                    <input type="number" id="montanas" placeholder="Montañas adyacentes">
                    <input type="number" id="prados" placeholder="Grupos de prados (2+)">
                    <input type="number" id="edificios" placeholder="Torres con bono">
                </div>
            </div>

            <!-- Recuento de Agua (Cara A/B) -->
            <div class="seccion-puntos">
                <h3>💧 Agua</h3>
                <select id="tipo-agua">
                    <option value="rio">Cara A: Río (Longitud)</option>
                    <option value="islas">Cara B: Islas (Cantidad)</option>
                </select>
                <input type="number" id="valor-agua" placeholder="Valor">
            </div>

            <button onclick="siguienteJugador()" id="btn-siguiente">SIGUIENTE JUGADOR</button>
        </section>

        <!-- PANTALLA 3: Resultados y Ranking Final -->
        <section id="pantalla-final" class="hidden">
            <h2>🏆 Ranking Final</h2>
            <div id="tabla-resultados">
                <!-- Aquí se genera dinámicamente el ranking y desempate por cubos -->
            </div>

            <button onclick="reiniciarPartida()" id="btn-nueva-partida">NUEVA PARTIDA</button>

            <!-- PIE DE PÁGINA: Firma del Autor -->
            <footer class="app-footer">
                <img src="PurplePhantomLudus2.png" alt="Manuel Herrera" class="footer-avatar">
                <p>Developed by <strong>Manuel Herrera</strong> &copy; 2026</p>
            </footer>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
